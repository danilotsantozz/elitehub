<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <!-- ==========================================
       CONFIGURAÇÕES
  =========================================== -->

  <meta charset="UTF-8">

  <meta name="viewport"
  content="width=device-width, initial-scale=1.0">

  <title>Login EliteTech</title>

  <!-- CSS -->
  <link rel="stylesheet" href="assets/login.css">

  <!-- FONT AWESOME -->
  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>



  <!-- ==========================================
       LOGIN BOX
  =========================================== -->

  <div class="login-box">



    <!-- LOGO -->
    <div class="logo">

      <i class="fa-solid fa-user-shield"></i>

    </div>





    <!-- TÍTULO -->
    <h1>EliteTech</h1>

    <p class="subtitulo">

      Área Restrita

    </p>





    <!-- USUÁRIO -->
    <div class="input-box">

      <i class="fa-solid fa-user"></i>

      <input
      type="text"
      id="usuario"
      placeholder="Digite seu usuário">

    </div>





    <!-- SENHA -->
    <div class="input-box">

      <i class="fa-solid fa-lock"></i>

      <input
      type="password"
      id="senha"
      placeholder="Digite sua senha">

    </div>





    <!-- BOTÃO -->
    <button onclick="fazerLogin()">

      Entrar

    </button>





    <!-- STATUS -->
    <p id="status"></p>

  </div>





  <!-- SCRIPT -->
  <script src="assets/login.js"></script>

</body>
</html>
